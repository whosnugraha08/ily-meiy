<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width,initial-scale=1.0,user-scalable=no"
        />
        <title>Hi Meiy 💙</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
            rel="stylesheet"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
                touch-action: none;
            }
            html,
            body {
                width: 100%;
                height: 100%;
                background: #000;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
            }
            canvas {
                display: block;
                image-rendering: pixelated;
                image-rendering: crisp-edges;
            }
            #mo {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 200;
                background: rgba(2, 1, 16, 0.96);
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
            #mo.show {
                display: flex;
            }
            .mc {
                border: 2.5px solid #5533bb;
                background: linear-gradient(160deg, #080520, #100830);
                padding: 30px 32px;
                max-width: min(90vw, 520px);
                width: 100%;
                display: flex;
                flex-direction: column;
                gap: 14px;
                position: relative;
            }
            .mc::after {
                content: "";
                position: absolute;
                inset: 8px;
                border: 1px solid #3322aa55;
                pointer-events: none;
            }
            .mt {
                font-family: "Press Start 2P", monospace;
                font-size: clamp(8px, 2.5vw, 11px);
                color: #ffe066;
                text-align: center;
                text-shadow: 0 0 14px #ffaa00;
            }
            .ms {
                font-family: "Press Start 2P", monospace;
                font-size: clamp(5px, 1.5vw, 6.5px);
                color: #9988cc;
                text-align: center;
                line-height: 2.1;
            }
            #mta {
                background: #030210;
                border: 1.5px solid #4422aa;
                color: #ccc8ff;
                font-family: "Press Start 2P", monospace;
                font-size: clamp(5px, 1.5vw, 7px);
                padding: 12px;
                resize: none;
                height: 110px;
                outline: none;
                line-height: 1.9;
                touch-action: auto;
            }
            #mta:focus {
                border-color: #9966ff;
            }
            #mta::placeholder {
                color: #2a2244;
            }
            .mc-bot {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            #mc-cnt {
                font-family: "Press Start 2P", monospace;
                font-size: clamp(4px, 1.2vw, 5.5px);
                color: #443366;
            }
            #sb {
                font-family: "Press Start 2P", monospace;
                font-size: clamp(6px, 2vw, 8px);
                background: linear-gradient(135deg, #4422cc, #7733ff);
                color: #fff;
                border: none;
                padding: 13px 20px;
                cursor: pointer;
                letter-spacing: 1px;
                touch-action: auto;
            }
            #sb:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            #ss {
                font-family: "Press Start 2P", monospace;
                font-size: clamp(4px, 1.2vw, 5.5px);
                min-height: 16px;
                color: #88ee88;
                text-align: center;
            }
            #ss.err {
                color: #ff6666;
            }
            #sk {
                background: none;
                border: none;
                font-family: "Press Start 2P", monospace;
                font-size: clamp(4px, 1.2vw, 5px);
                color: #332255;
                cursor: pointer;
                text-align: center;
            }
            #sk:hover {
                color: #665599;
            }
        </style>
    </head>
    <body>
        <canvas id="c"></canvas>
        <div id="mo">
            <div class="mc">
                <div class="mt">♥ Hei, Meiy ♥</div>
                <div class="ms">
                    Ada yang ingin kamu sampaikan?<br />Tuliskan di sini yaa —
                    Aku sangat senang jikalau kamu mengirimkan pesan untukku.
                </div>
                <textarea
                    id="mta"
                    maxlength="1000"
                    placeholder="Tulis apa yang ada di hatimu..."
                ></textarea>
                <div class="mc-bot">
                    <span id="mc-cnt">0/1000</span>
                    <button id="sb">✉ KIRIM ♥</button>
                </div>
                <div id="ss"></div>
                <button id="sk">lewati →</button>
            </div>
        </div>
        <script>
            // ================================================================
            // KUSTOMISASI MUDAH — GANTI ASSET DI SINI
            // ================================================================
            // --- MASUKKAN LINK BGM DI SINI ---
            const BGM1 = "songs1.mp3" ; // 🎵 Stage 1 — sedih, hujan
            const BGM2 = null; // 🎵 Stage 2 — semangat, runner
            const BGM3 = null; // 🎵 Stage 3 — hangat, romantis
            const BGME = null; // 🎵 Ending — melankolis, tenang
            // --- MASUKKAN LINK SFX DI SINI ---
            const SFX_BLOOP = null; // 🔊 ketik dialog
            const SFX_JUMP = null; // 🔊 lompat
            const SFX_PICK = null; // 🔊 ambil orb/not
            // --- MASUKKAN FOTO DI SINI ---
            const FOTO_MEIY = "meiy.png"; // 🖼️  foto Meiy (PNG 60×80 transparan)
            const FOTO_PLAYER = null; // 🖼️  sprite karakter utama (opsional)
            // --- WARNA PLACEHOLDER ---
            const CP = "#4A90D9",
                CM = "#FF8FAB",
                CO = "#FFE066",
                CB = "#E05252";
            const CN = ["#a78bfa", "#60a5fa", "#f472b6", "#fbbf24"];
            // --- DISCORD WEBHOOK ---
            const WH =
                "https://discord.com/api/webhooks/1311191126702690354/Yg-Qfwid_RK2k-KEwD2n48HaGXDwdKHpjMSYVTfUE1YTRyO63woIMCaexQmrIVgZpKns";

            // TAMBAHKAN INI UNTUK LOAD FOTO MEIY
            const imgMeiy = new Image();
            if (FOTO_MEIY) imgMeiy.src = FOTO_MEIY;

            const imgPlayer = new Image();
            if (FOTO_PLAYER) imgPlayer.src = FOTO_PLAYER;
            // ================================================================
            // CANVAS
            // ================================================================
            const canvas = document.getElementById("c"),
                ctx = canvas.getContext("2d");
            const F = '"Press Start 2P",monospace',
                BW = 854,
                BH = 480;
            let T = 0;
            function resize() {
                const s = Math.min(innerWidth / BW, innerHeight / BH);
                canvas.width = Math.round(BW * s);
                canvas.height = Math.round(BH * s);
            }
            resize();
            addEventListener("resize", resize);
            const G1Y = 388,
                G2Y = 382,
                G3Y = 360;

            // ================================================================
            // AUDIO
            // ================================================================
            let bgEl = null,
                ac = null;
            function ensureAC() {
                if (!ac)
                    ac = new (
                        window.AudioContext || window.webkitAudioContext
                    )();
                if (ac.state === "suspended") ac.resume();
                return ac;
            }
            function playBGM(s) {
                if (bgEl) {
                    bgEl.pause();
                    bgEl = null;
                }
                if (!s) return;
                bgEl = new Audio(s);
                bgEl.loop = true;
                bgEl.volume = 0.07; // <--- UBAH ANGKA INI (0.15 itu cukup pelan)
                bgEl.play().catch(() => {});
            }
            function tone(f1, f2, d, t, v) {
                try {
                    const a = ensureAC(),
                        o = a.createOscillator(),
                        g = a.createGain();
                    o.connect(g);
                    g.connect(a.destination);
                    o.type = t || "square";
                    o.frequency.setValueAtTime(f1, a.currentTime);
                    if (f2)
                        o.frequency.exponentialRampToValueAtTime(
                            f2,
                            a.currentTime + d,
                        );
                    g.gain.setValueAtTime(v || 0.08, a.currentTime);
                    g.gain.exponentialRampToValueAtTime(
                        0.001,
                        a.currentTime + d,
                    );
                    o.start();
                    o.stop(a.currentTime + d);
                } catch (e) {}
            }
            function sBloop() {
                SFX_BLOOP
                    ? new Audio(SFX_BLOOP).play()
                    : tone(360, 360, 0.06, "square", 0.05);
            }
            function sJump() {
                SFX_JUMP
                    ? new Audio(SFX_JUMP).play()
                    : tone(260, 540, 0.09, "square", 0.09);
            }
            function sPick() {
                SFX_PICK
                    ? new Audio(SFX_PICK).play()
                    : tone(500, 1200, 0.14, "sine", 0.09);
            }
            function sUI() {
                tone(440, 880, 0.1, "sine", 0.06);
            }

            // ================================================================
            // FADE  (alpha=0 → scene visible, alpha=1 → fully covered)
            // ================================================================
            let fd = { a: 0, dir: 0, col: "#000", dur: 700, el: 0, cb: null };
            // hideTo   : current screen fades OUT (alpha 0→1), then cb
            // showFrom : new screen fades IN     (alpha 1→0)
            function hideTo(col, dur, cb) {
                fd = { a: 0, dir: 1, col, dur, el: 0, cb };
            }
            function showFrom(col, dur, cb) {
                fd = { a: 1, dir: -1, col, dur, el: 0, cb };
            }
            function instant(a, col) {
                fd = { a, dir: 0, col, dur: 0, el: 0, cb: null };
            }
            function updFade(dt) {
                if (!fd.dir) return;
                fd.el += dt;
                fd.a = fd.dir === 1 ? fd.el / fd.dur : 1 - fd.el / fd.dur;
                fd.a = Math.max(0, Math.min(1, fd.a));
                if (fd.el >= fd.dur) {
                    fd.dir = 0;
                    const c = fd.cb;
                    fd.cb = null;
                    if (c) c();
                }
            }
            function drawFade() {
                if (fd.a < 0.005) return;
                ctx.fillStyle = fd.col;
                ctx.globalAlpha = fd.a;
                ctx.fillRect(0, 0, BW, BH);
                ctx.globalAlpha = 1;
            }

            // ================================================================
            // STATE MACHINE
            // ================================================================
            // TITLE → G1 → S1 → S1D → G2 → S2 → S2D → G3 → S3 → S3D → MSG → END
            let state = "TITLE";

            function goTo(newState, fadeCol, dur) {
                hideTo(fadeCol || "#000", dur || 600, () => {
                    state = newState;
                    showFrom(fadeCol || "#000", (dur || 600) * 1.1, null);
                });
            }

            // ================================================================
            // INPUT
            // ================================================================
            function sP(cx, cy) {
                const r = canvas.getBoundingClientRect();
                return {
                    x: (cx - r.left) * (BW / canvas.width),
                    y: (cy - r.top) * (BH / canvas.height),
                };
            }
            function onTap(x, y) {
                ensureAC();
                if (fd.dir !== 0) return; // block taps during fade
                switch (state) {
                    case "TITLE":
                        sUI();
                        playBGM(BGM1); // BGM langsung nyala di sini
                        hideTo("#000", 600, () => {
                            state = "WARN"; // Pindah ke layar Warning dulu
                            showFrom("#000", 700, null);
                        });
                        break;
                    case "WARN":
                        sUI();
                        hideTo("#000", 500, () => {
                            state = "G1"; // Baru pindah ke Panduan Stage 1
                            showFrom("#000", 700, null);
                        });
                        break;
                    case "G1":
                        sUI();
                        hideTo("#000", 500, () => {
                            initS1();
                            showFrom("#000", 700, null);
                        });
                        break;
                    case "S1":
                        s1SetX(x);
                        s1Jump();
                        break;
                    case "S1D":
                        dlgNext();
                        break;
                    case "G2":
                        sUI();
                        hideTo("#000", 500, () => {
                            initS2();
                            showFrom("#000", 700, null);
                        });
                        break;
                    case "S2":
                        s2Jump();
                        break;
                    case "S2D":
                        dlgNext();
                        break;
                    case "G3":
                        sUI();
                        hideTo("#000", 500, () => {
                            initS3();
                            showFrom("#000", 700, null);
                        });
                        break;
                    case "S3":
                        s3Tap(x, y);
                        break;
                    case "S3D":
                        dlgNext();
                        break;
                    case "END":
                        endTap(x, y);
                        break;
                }
            }
            function onMove(x, y) {
                if (state === "S1") s1SetX(x);
            }
            canvas.addEventListener("click", (e) => {
                e.preventDefault();
                const p = sP(e.clientX, e.clientY);
                onTap(p.x, p.y);
            });
            canvas.addEventListener("mousemove", (e) => {
                const p = sP(e.clientX, e.clientY);
                onMove(p.x, p.y);
            });
            canvas.addEventListener(
                "touchstart",
                (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    const p = sP(t.clientX, t.clientY);
                    onTap(p.x, p.y);
                },
                { passive: false },
            );
            canvas.addEventListener(
                "touchmove",
                (e) => {
                    e.preventDefault();
                    const t = e.touches[0];
                    const p = sP(t.clientX, t.clientY);
                    onMove(p.x, p.y);
                },
                { passive: false },
            );

            // ================================================================
            // DISCORD WEBHOOK
            // ================================================================
            const mo = document.getElementById("mo"),
                mta = document.getElementById("mta"),
                sb = document.getElementById("sb"),
                ss = document.getElementById("ss");
            mta.addEventListener("input", () => {
                document.getElementById("mc-cnt").textContent =
                    mta.value.length + "/1000";
            });
            sb.addEventListener("click", async () => {
                const msg = mta.value.trim();
                if (!msg) {
                    ss.textContent = "Tulis sesuatu dulu ya ✦";
                    ss.className = "err";
                    return;
                }
                sb.disabled = true;
                ss.className = "";
                ss.textContent = "Mengirim...";
                let ok = false;
                try {
                    const r = await fetch(WH, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            username: "Untuk Meiy 💙",
                            embeds: [
                                {
                                    title: "💌 Pesan dari Meiy",
                                    description: msg,
                                    color: 0xff8fab,
                                    footer: {
                                        text: 'dari game "Untuk Meiy" ♥',
                                    },
                                    timestamp: new Date().toISOString(),
                                },
                            ],
                        }),
                    });
                    ok = r.status === 204 || r.ok;
                } catch (e) {}
                if (ok) {
                    ss.textContent = "✓ Terkirim! Aku sudah membacanya ♥";
                    setTimeout(() => closeMsg(), 2200);
                } else {
                    ss.className = "err";
                    ss.textContent = "Gagal kirim. Coba lagi?";
                    sb.disabled = false;
                }
            });
            document
                .getElementById("sk")
                .addEventListener("click", () => closeMsg());
            function openMsg() {
                mo.classList.add("show");
            }
            function closeMsg() {
                mo.classList.remove("show");
                hideTo("#000", 900, () => {
                    initEnd();
                    state = "END";
                    showFrom("#000", 1200, null);
                });
            }

            // ================================================================
            // DIALOG BOX
            // ================================================================
            let dlg = {
                on: false,
                pages: [],
                pi: 0,
                ci: 0,
                tmr: 0,
                rdy: false,
                cb: null,
            };
            function startDlg(pages, cb) {
                dlg = { on: true, pages, pi: 0, ci: 0, tmr: 0, rdy: false, cb };
            }
            function updDlg(dt) {
                if (!dlg.on) return;
                dlg.tmr += dt;
                while (dlg.tmr >= 35 && dlg.ci < dlg.pages[dlg.pi].length) {
                    dlg.tmr -= 35;
                    dlg.ci++;
                    if (dlg.ci % 2 === 0) sBloop();
                }
                if (dlg.ci >= dlg.pages[dlg.pi].length) dlg.rdy = true;
            }
            function dlgNext() {
                if (!dlg.on) return;
                if (!dlg.rdy) {
                    dlg.ci = dlg.pages[dlg.pi].length;
                    dlg.rdy = true;
                    return;
                }
                dlg.pi++;
                if (dlg.pi >= dlg.pages.length) {
                    dlg.on = false;
                    const c = dlg.cb;
                    dlg.cb = null;
                    if (c) c();
                    return;
                }
                dlg.ci = 0;
                dlg.tmr = 0;
                dlg.rdy = false;
            }
            function drawDlg() {
                if (!dlg.on) return;
                const bh = 148,
                    bx = 10,
                    bw = BW - 20,
                    by = BH - bh - 10,
                    pad = 16;
                ctx.fillStyle = "rgba(0,0,0,0.55)";
                ctx.fillRect(bx + 5, by + 5, bw, bh);
                ctx.fillStyle = "#030310";
                ctx.fillRect(bx, by, bw, bh);
                ctx.strokeStyle = "#5555ff";
                ctx.lineWidth = 3;
                ctx.strokeRect(bx, by, bw, bh);
                ctx.strokeStyle = "#2222aa";
                ctx.lineWidth = 1;
                ctx.strokeRect(bx + 6, by + 6, bw - 12, bh - 12);
                [
                    [bx, by],
                    [bx + bw - 8, by],
                    [bx, by + bh - 8],
                    [bx + bw - 8, by + bh - 8],
                ].forEach(([cx, cy]) => {
                    ctx.fillStyle = "#6666ff";
                    ctx.fillRect(cx, cy, 8, 8);
                });
                const txt = dlg.pages[dlg.pi].substring(0, dlg.ci);
                ctx.fillStyle = "#dde0ff";
                ctx.font = `7px ${F}`;
                ctx.textAlign = "left";
                const mw = bw - pad * 2,
                    lh = 19;
                let line = "",
                    ly = by + pad + 14;
                for (const w of txt.split(" ")) {
                    const t = line + (line ? " " : "") + w;
                    if (ctx.measureText(t).width > mw && line) {
                        ctx.fillText(line, bx + pad, ly);
                        line = w;
                        ly += lh;
                    } else line = t;
                }
                if (line) ctx.fillText(line, bx + pad, ly);
                if (dlg.rdy && Math.floor(T / 500) % 2 === 0) {
                    ctx.fillStyle = "#ffff44";
                    ctx.font = `6px ${F}`;
                    ctx.textAlign = "right";
                    ctx.fillText("▼ TAP", bx + bw - pad, by + bh - 12);
                }
            }
            function txt(t, x, y, sz, col, al) {
                ctx.font = `${sz}px ${F}`;
                ctx.fillStyle = col;
                ctx.textAlign = al || "center";
                ctx.fillText(t, x, y);
            }

            // ================================================================
            // COMMON STARS
            // ================================================================
            const STARS = Array.from({ length: 110 }, () => ({
                x: Math.random() * BW,
                y: Math.random() * BH,
                r: Math.random() * 1.8 + 0.4,
                ph: Math.random() * Math.PI * 2,
            }));

            // ================================================================
            // TITLE SCREEN
            // ================================================================
            function drawTitle() {
                const g = ctx.createLinearGradient(0, 0, 0, BH);
                g.addColorStop(0, "#020210");
                g.addColorStop(1, "#0b0720");
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, BW, BH);
                STARS.forEach((s) => {
                    const a = Math.sin(T / 600 + s.ph) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(200,200,255,${a})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                const ss = ((T * 0.055) % (BW + 260)) - 100;
                ctx.strokeStyle = "rgba(255,255,200,0.45)";
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.moveTo(ss, 65);
                ctx.lineTo(ss - 55, 92);
                ctx.stroke();
                const cx = BW / 2,
                    cy = BH / 2;
                ctx.fillStyle = "rgba(255,255,255,0.025)";
                ctx.fillRect(cx - 220, cy - 118, 440, 238);
                ctx.strokeStyle = "rgba(80,80,220,0.2)";
                ctx.lineWidth = 1;
                ctx.strokeRect(cx - 220, cy - 118, 440, 238);
                txt("♥  SEDIKIT CERITA  ♥", cx, cy - 95, 6, "#4444aa");
                txt("UNTUK", cx, cy - 72, 12, "#88aaff");
                ctx.shadowColor = "#ff8fab";
                ctx.shadowBlur = 28;
                txt("MEIY", cx, cy - 5, 46, "#ffe066");
                ctx.shadowBlur = 0;
                txt(
                    "dari seseorang yang menunggumu...",
                    cx,
                    cy + 42,
                    6,
                    "#7777bb",
                );
                if (Math.floor(T / 660) % 2 === 0)
                    txt("— TAP UNTUK MULAI —", cx, cy + 78, 7, "#ffffff");
                ["#ff8fab", "#a78bfa", "#60a5fa", "#fbbf24", "#34d399"].forEach(
                    (c, i) => {
                        ctx.font = `14px ${F}`;
                        ctx.textAlign = "center";
                        ctx.fillStyle = c;
                        ctx.fillText(
                            "♥",
                            cx - 48 + i * 24,
                            BH - 30 + Math.sin(T / 400 + i) * 2.5,
                        );
                    },
                );
            }

            // ================================================================
            // WARNING SCREEN (PERMOHONAN PENTING)
            // ================================================================
            function drawWarn() {
                // Background merah gelap
                const g = ctx.createLinearGradient(0, 0, 0, BH);
                g.addColorStop(0, "#1a0202");
                g.addColorStop(1, "#0a0000");
                ctx.fillStyle = g;
                ctx.fillRect(0, 0, BW, BH);

                STARS.forEach((s) => {
                    const a = Math.sin(T / 600 + s.ph) * 0.4 + 0.6;
                    ctx.fillStyle = `rgba(255,100,100,${a * 0.3})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
                    ctx.fill();
                });

                const cx = BW / 2, cy = BH / 2;
                const bx = cx - 290, by = cy - 120, bw = 580, bh = 240;

                // Kotak Warning
                ctx.fillStyle = "rgba(0,0,0,0.6)";
                ctx.fillRect(bx + 8, by + 8, bw, bh);
                const bgBox = ctx.createLinearGradient(bx, by, bx, by + bh);
                bgBox.addColorStop(0, "#1a0505");
                bgBox.addColorStop(1, "#260606");
                ctx.fillStyle = bgBox;
                ctx.fillRect(bx, by, bw, bh);
                
                // Border Warning
                ctx.strokeStyle = "#ff3333";
                ctx.lineWidth = 3;
                ctx.strokeRect(bx, by, bw, bh);
                ctx.strokeStyle = "#aa1111";
                ctx.lineWidth = 1;
                ctx.strokeRect(bx + 6, by + 6, bw - 12, bh - 12);

                [[bx, by], [bx + bw - 8, by], [bx, by + bh - 8], [bx + bw - 8, by + bh - 8]].forEach(([px, py]) => {
                    ctx.fillStyle = "#ff5555";
                    ctx.fillRect(px, py, 8, 8);
                });

                // Teks Warning
                ctx.shadowColor = "#ff3333";
                ctx.shadowBlur = 15;
                txt("⚠  PESAN PENTING  ⚠", cx, by + 45, 12, "#ff5555");
                ctx.shadowBlur = 0;

                txt("Tolong, mulailah dengan hati yang tenang.", cx, by + 80, 7, "#ffcccc");
                
                txt("Aku memohon, perhatikanlah setiap pesan dan makna", cx, by + 115, 6.5, "#dddddd");
                txt("di setiap langkah dan perjalanannya nanti.", cx, by + 135, 6.5, "#dddddd");

                    ac.addColorStop(1, "rgba(60,0,160,0)");
                    ctx.fillStyle = ac;
                    ctx.fillRect(0, ay - 28, BW, 56);
                }
                // Stars
                ED.stars.forEach((s) => {
                    const a = Math.sin(T / 500 + s.ph) * 0.45 + 0.55;
                    ctx.fillStyle = `rgba(255,215,170,${a})`;
                    ctx.beginPath();
                    ctx.arc(s.x, s.y, s.r * a, 0, Math.PI * 2);
                    ctx.fill();
                });
                // Moon
                ctx.fillStyle = "#fff8e0";
                ctx.shadowColor = "rgba(255,240,150,0.5)";
                ctx.shadowBlur = 28;
                ctx.beginPath();
                ctx.arc(BW - 85, 65, 30, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "rgba(255,220,80,0.12)";
                ctx.beginPath();
                ctx.arc(BW - 85, 65, 62, 0, Math.PI * 2);
                ctx.fill();
                // Shooting stars
                ED.shoots.forEach((s) => {
                    const sg = ctx.createLinearGradient(
                        s.x - s.vx * 9,
                        s.y - s.vy * 9,
                        s.x,
                        s.y,
                    );
                    sg.addColorStop(0, "rgba(255,255,255,0)");
                    sg.addColorStop(1, `rgba(255,255,220,${s.life * 0.8})`);
                    ctx.strokeStyle = sg;
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(s.x - s.vx * 9, s.y - s.vy * 9);
                    ctx.lineTo(s.x, s.y);
                    ctx.stroke();
                });
                // Floating message
                if (ED.curMsg) {
                    const ml = ED.curMsg.life,
                        mx = ED.curMsg.max;
                    const ma = Math.max(
                        0,
                        Math.min(
                            1,
                            ml < 600
                                ? ml / 600
                                : ml > mx - 700
                                  ? (mx - ml) / 700
                                  : 1,
                        ),
                    );
                    ctx.globalAlpha = ma * 0.82;
                    ctx.font = `7px ${F}`;
                    ctx.textAlign = "left";
                    ctx.fillStyle = "#ccccff";
                    ctx.fillText(ED.curMsg.txt, ED.curMsg.x, ED.curMsg.y);
                    ctx.globalAlpha = 1;
                }
                // Distant hills
                ctx.fillStyle = "rgba(8,3,22,0.92)";
                ctx.beginPath();
                ctx.moveTo(0, G3Y);
                [
                    0,
                    80,
                    160,
                    240,
                    320,
                    400,
                    480,
                    560,
                    640,
                    720,
                    800,
                    BW,
                ].forEach((hx, i) => {
                    ctx.lineTo(
                        hx,
                        G3Y - [0, 38, 24, 48, 20, 40, 30, 52, 22, 42, 28, 0][i],
                    );
                });
                ctx.lineTo(BW, BH);
                ctx.lineTo(0, BH);
                ctx.fill();
                // Big tree (silhouette)
                ctx.fillStyle = "rgba(5,2,14,0.95)";
                ctx.fillRect(640, G3Y - 88, 14, 88);
                [
                    [0, 88, 52],
                    [0, 110, 42],
                    [-10, 130, 36],
                    [10, 148, 30],
                    [-30, 78, 30],
                    [32, 75, 28],
                ].forEach(([ox, h, r]) => {
                    ctx.beginPath();
                    ctx.arc(640 + 7 + ox, G3Y - h, r, 0, Math.PI * 2);
                    ctx.fill();
                });
                // Ground
                ctx.fillStyle = "#100420";
                ctx.fillRect(0, G3Y, BW, BH - G3Y);
                ctx.fillStyle = "#5a22a0";
                ctx.fillRect(0, G3Y, BW, 4);
                // Fireflies
                ED.ff.forEach((f, i) => {
                    const fx = (f.b + T * 0.035 * ((i % 3) + 0.5)) % BW,
                        fy = G3Y - 32 - Math.sin(T / 750 + f.ph) * 36;
                    const a = Math.sin(T / 500 + f.ph) * 0.5 + 0.5;
                    ctx.fillStyle = `rgba(255,242,100,${a * 0.65})`;
                    ctx.beginPath();
                    ctx.arc(fx, fy, 2.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(255,230,80,${a * 0.1})`;
                    ctx.beginPath();
                    ctx.arc(fx, fy, 8, 0, Math.PI * 2);
                    ctx.fill();
                });
                // Lanterns
                ED.lanterns.forEach((l) => {
                    const rg = ctx.createRadialGradient(
                        l.x,
                        l.y,
                        1,
                        l.x,
                        l.y,
                        l.r * 2.6,
                    );
                    rg.addColorStop(0, `rgba(255,220,80,${l.a * 0.88})`);
                    rg.addColorStop(0.4, `rgba(255,180,40,${l.a * 0.35})`);
                    rg.addColorStop(1, "rgba(255,140,0,0)");
                    ctx.fillStyle = rg;
                    ctx.beginPath();
                    ctx.arc(l.x, l.y, l.r * 2.6, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = `rgba(255,230,100,${l.a})`;
                    ctx.beginPath();
                    ctx.arc(l.x, l.y, l.r, 0, Math.PI * 2);
                    ctx.fill();
                });
                // Sitting character
                drawCharSit(560, G3Y - 44);
                // Farewell text
                const fa = Math.min(ED.fareIn / 2000, 1);
                ctx.globalAlpha = fa;
                ctx.shadowColor = "#ff8fab";
                ctx.shadowBlur = 14;

                // Ubah ke G3Y + 26 (Turun sedikit menjauhi garis ungu)
                txt("Sampai nanti, Meiy.", BW / 2, G3Y + 26, 10, "#ffe066");
                ctx.shadowBlur = 0;

                // Ubah ke G3Y + 44
                txt(
                    "Aku akan selalu ada di sini untukmu.",
                    BW / 2,
                    G3Y + 44,
                    6,
                    "#ccaaee",
                );

                // Ubah ke G3Y + 58 (Masih aman dari tombol)
                txt(
                    "— tidak akan kemana-mana —",
                    BW / 2,
                    G3Y + 58,
                    5.5,
                    "#886699",
                );
                ctx.globalAlpha = 1;
                // Tap sky hint
                if (Math.floor(T / 900) % 2 === 0)
                    txt(
                        "✦ tap langit → lepaskan lentera ✦",
                        BW / 2,
                        G3Y - 14,
                        5,
                        "rgba(200,180,255,0.33)",
                    );
                // Replay
                const bx = BW / 2 - 90,
                    by = BH - 54,
                    bw = 180,
                    bh = 36,
                    pl = Math.sin(T / 500) * 2.5;
                ctx.fillStyle = "#0c1340";
                ctx.fillRect(bx - pl / 2, by - pl / 2, bw + pl, bh + pl);
                ctx.strokeStyle = "#4455ff";
                ctx.lineWidth = 2.5;
                ctx.strokeRect(bx - pl / 2, by - pl / 2, bw + pl, bh + pl);
                ctx.fillStyle = "#fff";
                ctx.font = `7px ${F}`;
                ctx.textAlign = "center";
                ctx.fillText("▶  MULAI LAGI", BW / 2, by + 24);
            }

            // ================================================================
            // CHARACTER SPRITES
            // ================================================================
            function drawCharA(x, y, run, tilt) {
                const bob = run ? Math.sin(T / 120) * 3 : 0;
                ctx.save();
                ctx.translate(x + 16, y + 21);
                ctx.rotate(tilt);
                ctx.translate(-16, -21);
                ctx.fillStyle = "rgba(0,0,0,0.18)";
                ctx.beginPath();
                ctx.ellipse(16, 43, 14, 4, 0, 0, Math.PI * 2);
                ctx.fill();
                const la = run ? Math.sin(T / 90) * 7 : 0;
                ctx.fillStyle = "#1a3880";
                ctx.fillRect(3, 32 + bob, 12, 14 + Math.max(0, la));
                ctx.fillRect(18, 32 + bob, 12, 14 - Math.min(0, la));
                ctx.fillStyle = CP;
                ctx.fillRect(2, 12 + bob, 28, 23);
                ctx.fillStyle = "#ff8fab";
                ctx.fillRect(2, 20 + bob, 28, 6);
                ctx.fillStyle = "#72b8f5";
                ctx.fillRect(5, 0 + bob, 22, 16);
                ctx.fillStyle = "#1a2a58";
                ctx.fillRect(4, -6 + bob, 24, 8);
                ctx.fillStyle = "#000";
                ctx.fillRect(8, 3 + bob, 5, 5);
                ctx.fillRect(19, 3 + bob, 5, 5);
                ctx.fillStyle = "#fff";
                ctx.fillRect(9, 4 + bob, 2, 2);
                ctx.fillRect(20, 4 + bob, 2, 2);
                ctx.fillStyle = CP;
                ctx.fillRect(-5, 16 + bob, 8, 6);
                ctx.fillRect(29, 16 + bob, 8, 6);
                ctx.restore();
            }
            function drawCharSit(x, y) {
                const br = Math.sin(ED.breath / 1900) * 1.5;
                ctx.fillStyle = "rgba(0,0,0,0.18)";
                ctx.beginPath();
                ctx.ellipse(x + 15, y + 47 + br, 20, 5, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#1a3880";
                ctx.fillRect(x - 2, y + 34 + br, 20, 11);
                ctx.fillRect(x + 8, y + 40 + br, 20, 10);
                ctx.fillStyle = CP;
                ctx.fillRect(x + 1, y + 12 + br, 26, 24);
                ctx.fillStyle = "#ff8fab";
                ctx.fillRect(x + 1, y + 20 + br, 26, 6);
                ctx.fillStyle = "#72b8f5";
                ctx.fillRect(x + 4, y - 1 + br, 22, 16);
                ctx.fillStyle = "#1a2a58";
                ctx.fillRect(x + 3, y - 7 + br, 24, 9);
                ctx.fillStyle = "#000";
                ctx.fillRect(x + 7, y + 2 + br, 5, 4);
                ctx.fillRect(x + 18, y + 2 + br, 5, 4);
                ctx.fillStyle = "#fff";
                ctx.fillRect(x + 8, y + 2 + br, 2, 2);
                ctx.fillRect(x + 19, y + 2 + br, 2, 2);
                ctx.fillStyle = CP;
                ctx.fillRect(x - 4, y + 18 + br, 7, 14);
                ctx.fillRect(x + 27, y + 18 + br, 7, 14);
                // floating heart
                const hp = (T % 3000) / 3000,
                    ha = Math.max(
                        0,
                        Math.min(
                            1,
                            hp < 0.3 ? hp / 0.3 : hp > 0.7 ? (1 - hp) / 0.3 : 1,
                        ),
                    );
                ctx.globalAlpha = ha * 0.85;
                ctx.fillStyle = "#ff8fab";
                ctx.font = `10px ${F}`;
                ctx.textAlign = "center";
                ctx.fillText("♥", x + 15, y - 8 - hp * 48);
                ctx.globalAlpha = 1;
            }
            function drawInstr(px, py, t) {
                const bob = Math.sin(t) * 2.5;
                ctx.fillStyle = "#5B2A06";
                ctx.fillRect(px + 44, py + 12 + bob, 16, 24);
                ctx.fillStyle = "#B86C28";
                ctx.beginPath();
                ctx.ellipse(px + 52, py + 32 + bob, 11, 14, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = "#2c1000";
                ctx.beginPath();
                ctx.arc(px + 52, py + 30 + bob, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = "rgba(255,255,200,0.55)";
                ctx.lineWidth = 0.9;
                [48, 52, 56].forEach((sx) => {
                    ctx.beginPath();
                    ctx.moveTo(px + sx, py + 18 + bob);
                    ctx.lineTo(px + sx, py + 42 + bob);
                    ctx.stroke();
                });
            }
            function drawMeiy(mx, my, hearts, t) {
                mx -= 22;
                const bob = Math.sin(t + 1) * 2.5;

                // Bayangan Bawah
                ctx.fillStyle = "rgba(0,0,0,0.17)";
                ctx.beginPath();
                ctx.ellipse(mx + 22, my + 62 + bob, 17, 4, 0, 0, Math.PI * 2);
                ctx.fill();

                // Rambut belakang pixel (Hanya muncul jika tidak pakai foto)
                if (!FOTO_MEIY || !imgMeiy.complete) {
                    ctx.fillStyle = "#ff4d88";
                    ctx.beginPath();
                    ctx.moveTo(mx - 8, my + 42 + bob);
                    ctx.lineTo(mx + 52, my + 42 + bob);
                    ctx.lineTo(mx + 58, my + 62 + bob);
                    ctx.lineTo(mx - 14, my + 62 + bob);
                    ctx.fill();
                }

                // Badan (Tetap digambar)
                ctx.fillStyle = CM;
                ctx.fillRect(mx + 4, my + 14 + bob, 34, 29); // Baju
                ctx.fillStyle = "#ffaacc";
                ctx.fillRect(mx + 4, my + 23 + bob, 34, 6); // Sabuk/Garis Baju
                ctx.fillStyle = CM;
                ctx.fillRect(mx - 4, my + 19 + bob, 8, 6); // Tangan Kiri
                ctx.fillRect(mx + 40, my + 19 + bob, 8, 6); // Tangan Kanan

                // BAGIAN KEPALA
                if (FOTO_MEIY && imgMeiy.complete) {
                    // Jika ada foto, gambar foto di atas badan
                    ctx.drawImage(imgMeiy, mx + 1, my - 31 + bob, 40, 50);
                } else {
                    // Jika tidak ada foto, gambar kepala pixel
                    ctx.fillStyle = "#ffb8ca";
                    ctx.fillRect(mx + 6, my - 1 + bob, 30, 21);
                    ctx.fillStyle = "#221030";
                    ctx.fillRect(mx + 4, my - 9 + bob, 32, 12);
                    ctx.fillRect(mx - 2, my - 1 + bob, 9, 27);
                    ctx.fillRect(mx + 37, my - 1 + bob, 9, 27);
                    ctx.fillStyle = "#1a0820";
                    ctx.fillRect(mx + 10, my + 3 + bob, 7, 8);
                    ctx.fillRect(mx + 27, my + 3 + bob, 7, 8);
                    ctx.fillStyle = "#fff";
                    ctx.fillRect(mx + 11, my + 4 + bob, 3, 3);
                    ctx.fillRect(mx + 28, my + 4 + bob, 3, 3);
                    ctx.fillStyle = "rgba(255,115,150,0.42)";
                    ctx.beginPath();
                    ctx.ellipse(
                        mx + 14,
                        my + 10 + bob,
                        6,
                        3,
                        0,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                    ctx.beginPath();
                    ctx.ellipse(
                        mx + 30,
                        my + 10 + bob,
                        6,
                        3,
                        0,
                        0,
                        Math.PI * 2,
                    );
                    ctx.fill();
                }

                // Efek Hati
                if (hearts) {
                    ["#ff2288", "#ff6699", "#ffbbdd"].forEach((c, i) => {
                        const hx = mx + 22 + Math.sin(T / 400 + i * 2.1) * 17,
                            hy = my - 24 - i * 16 + Math.sin(T / 300 + i) * 9;
                        ctx.fillStyle = c;
                        ctx.globalAlpha = 0.9 - i * 0.22;
                        ctx.font = `${14 - i * 2}px ${F}`;
                        ctx.textAlign = "center";
                        ctx.fillText("♥", hx, hy);
                    });
                    ctx.globalAlpha = 1;
                }
            }

            // ================================================================
            // MAIN LOOP
            // ================================================================
            let last = 0;
            function loop(ts) {
                const dt = Math.min(ts - last, 50);
                last = ts;
                T = ts;
                requestAnimationFrame(loop);
                ctx.save();
                ctx.scale(canvas.width / BW, canvas.height / BH);
                ctx.clearRect(0, 0, BW, BH);
                // UPDATE
                updFade(dt);
                if (dlg.on) updDlg(dt);
                if (state === "G1" || state === "G2" || state === "G3")
                    updGuide(dt);
                if (state === "S1" || state === "S1D") updS1(dt);
                if (state === "S2" || state === "S2D") updS2(dt);
                if (state === "S3" || state === "S3D") updS3(dt);
                if (state === "END") updEnd(dt);
                // DRAW
                if (state === "TITLE") drawTitle();
                else if (state === "WARN") drawWarn();
                else if (state === "G1") {
                    const G = GD.G1;
                    drawGuide(
                        G.num,
                        G.col,
                        G.lbl,
                        G.meaning,
                        G.ctrls,
                        guideTapReady,
                    );
                } else if (state === "S1" || state === "S1D") drawS1();
                else if (state === "G2") {
                    const G = GD.G2;
                    drawGuide(
                        G.num,
                        G.col,
                        G.lbl,
                        G.meaning,
                        G.ctrls,
                        guideTapReady,
                    );
                } else if (state === "S2" || state === "S2D") drawS2();
                else if (state === "G3") {
                    const G = GD.G3;
                    drawGuide(
                        G.num,
                        G.col,
                        G.lbl,
                        G.meaning,
                        G.ctrls,
                        guideTapReady,
                    );
                } else if (state === "S3" || state === "S3D") drawS3();
                else if (state === "MSG") drawMsg();
                else if (state === "END") drawEnd();
                if (dlg.on) drawDlg();
                drawFade();
                ctx.restore();
            }
            requestAnimationFrame(loop);
        </script>
    </body>
</html>
